    <path d="M50 66c0 0 4-5 14-5s14 5 14 5" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>
    <circle cx="64" cy="76" r="3" fill="white" opacity="0.9"/>
  </g>
</svg>
