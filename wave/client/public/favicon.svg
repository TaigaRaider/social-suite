<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="wave-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00a884"/>
      <stop offset="100%" stop-color="#25d366"/>
    </linearGradient>
    <filter id="wave-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#wave-bg)"/>
  <g filter="url(#wave-shadow)">
    <!-- Phone/speech bubble -->
    <path d="M64 24C42 24 24 40 24 60c0 12 6 22 16 28l-4 16 18-10c4 1 8 2 12 2 22 0 40-16 40-36S86 24 64 24z" fill="none" stroke="white" stroke-width="4.5" stroke-linejoin="round"/>
    <!-- Sound waves -->
