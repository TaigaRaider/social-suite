<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="nexus-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a77f2"/>
      <stop offset="100%" stop-color="#0d5bc4"/>
    </linearGradient>
    <linearGradient id="nexus-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4599ff"/>
      <stop offset="100%" stop-color="#1a77f2"/>
    </linearGradient>
    <filter id="nexus-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#nexus-bg)"/>
  <g filter="url(#nexus-shadow)">
    <!-- Connected nodes forming an N -->
    <circle cx="32" cy="90" r="8" fill="white" opacity="0.95"/>
    <circle cx="32" cy="38" r="8" fill="white" opacity="0.95"/>
    <circle cx="96" cy="90" r="8" fill="white" opacity="0.95"/>
    <circle cx="96" cy="38" r="8" fill="white" opacity="0.95"/>
    <!-- Lines connecting the nodes -->
    <line x1="32" y1="82" x2="32" y2="46" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.95"/>
    <line x1="32" y1="38" x2="96" y2="90" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.95"/>
    <line x1="96" y1="82" x2="96" y2="46" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.95"/>
    <!-- Center accent dot -->
    <circle cx="64" cy="64" r="4" fill="url(#nexus-accent)" opacity="0.8"/>
  </g>
</svg>
