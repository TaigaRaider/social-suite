<svg xmlns="http://www.w3.org/2000/svg" width="1284" height="2778" viewBox="0 0 1284 2778">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d1b3e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0084ff"/>
      <stop offset="100%" stop-color="#00c6ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1284" height="2778" fill="url(#bg)"/>
  <!-- Logo container -->
  <g transform="translate(642, 1200)" filter="url(#glow)">
    <!-- Rounded square background -->
    <rect x="-120" y="-120" width="240" height="240" rx="52" fill="url(#accent)" opacity="0.15"/>
    <rect x="-120" y="-120" width="240" height="240" rx="52" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.4"/>
    <!-- Lightning bolt -->
    <path d="M20,-70 L-30,10 L10,10 L-20,70 L50,-10 L10,-10 Z" fill="white" opacity="0.95"/>
  </g>
  <!-- App name -->
  <text x="642" y="1400" text-anchor="middle" fill="white" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700" font-size="72" letter-spacing="-1">Pulse</text>
  <!-- Tagline -->
  <text x="642" y="1460" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="400" font-size="26" letter-spacing="4">FEEL THE CONVERSATION</text>
  <!-- Loading dots -->
  <circle cx="612" cy="1560" r="6" fill="#0084ff" opacity="0.8"/>
  <circle cx="642" cy="1560" r="6" fill="#0084ff" opacity="0.5"/>
  <circle cx="672" cy="1560" r="6" fill="#0084ff" opacity="0.3"/>
</svg>
