<svg xmlns="http://www.w3.org/2000/svg" width="1284" height="2778" viewBox="0 0 1284 2778">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="50%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1284" height="2778" fill="url(#bg)"/>
  <!-- Logo container -->
  <g transform="translate(642, 1200)" filter="url(#glow)">
    <!-- Rounded square background -->
    <rect x="-120" y="-120" width="240" height="240" rx="52" fill="#181818"/>
    <rect x="-120" y="-120" width="240" height="240" rx="52" fill="none" stroke="#333" stroke-width="2"/>
    <!-- Stylized W -->
    <path d="M-60,-40 L-30,40 L0,-10 L30,40 L60,-40" fill="none" stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
    <!-- Whisper lines -->
    <line x1="-40" y1="60" x2="-10" y2="60" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
    <line x1="0" y1="60" x2="20" y2="60" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.25"/>
    <line x1="30" y1="60" x2="50" y2="60" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.12"/>
  </g>
  <!-- App name -->
  <text x="642" y="1400" text-anchor="middle" fill="white" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700" font-size="72" letter-spacing="-1">Whisper</text>
  <!-- Tagline -->
  <text x="642" y="1460" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="400" font-size="26" letter-spacing="4">THOUGHTS IN MOTION</text>
  <!-- Loading dots -->
  <circle cx="612" cy="1560" r="6" fill="white" opacity="0.6"/>
  <circle cx="642" cy="1560" r="6" fill="white" opacity="0.4"/>
  <circle cx="672" cy="1560" r="6" fill="white" opacity="0.2"/>
</svg>
