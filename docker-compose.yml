      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5173}
    volumes:
      - wave-data:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3004/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  whisper:
    build: ./whisper/server
    ports:
      - "3005:3005"
    environment:
      - NODE_ENV=production
      - PORT=3005
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5173}
    volumes:
      - whisper-data:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3005/api/health"]
      interval: 30s
